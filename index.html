<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Ника ✨</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    background: #000;
    min-height: 100dvh;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* ===== Звёздный фон ===== */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* ===== Hero ===== */
.hero {
    position: relative;
    z-index: 2;
    height: 60dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow: hidden;
}

h1 {
    font-size: clamp(40px, 10vw, 120px);
    font-weight: bold;
    opacity: 0;
    transform: scale(0.8);
    text-align: center;
    word-break: break-word;
    max-width: 100%;
    cursor: pointer;

    background: linear-gradient(
        45deg,
        #ff00cc,
        #3333ff,
        #00ffff,
        #ffcc00,
        #ff0066
    );
    background-size: 400% 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;

    animation:
        gradientMove 6s ease infinite,
        fadeInText 3s ease forwards;

    text-shadow: 0 0 25px rgba(255,255,255,0.4);
}

h1:hover {
    transform: scale(1.05);
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes fadeInText {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* ===== Feed ===== */
.feed {
    position: relative;
    z-index: 2;
    background: transparent;
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 20px;
}

.feed img {
    width: 100%;
    display: block;
    border-radius: 10px;
    object-fit: cover;
    transition: all 0.3s ease;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.feed img:hover {
    transform: scale(1.02);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
}

/* ===== Fullscreen контейнер ===== */
.fullscreen-container {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1000;
    background: #000;
    justify-content: center;
    align-items: center;
}

.fullscreen-container.active {
    display: flex;
}

.fullscreen-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.fullscreen-close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.8);
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    z-index: 1001;
}

.fullscreen-close:hover {
    background: rgba(255, 255, 255, 1);
}

/* ===== Кнопка музыки ===== */
.controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    gap: 10px;
}

.music-button,
.fullscreen-button {
    background: #ffffff;
    color: #000000;
    border: none;
    padding: 14px 22px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.25s ease;
    box-shadow: 0 8px 25px rgba(0,0,0,0.35);
}

.music-button:hover,
.fullscreen-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 35px rgba(0,0,0,0.5);
}

.music-button.playing {
    background: #000000;
    color: #ffffff;
}

/* Адаптив для мобильных */
@media (max-width: 768px) {
    h1 {
        font-size: clamp(32px, 12vw, 80px);
    }
    
    .hero {
        height: 50dvh;
        padding: 10px;
    }

    .controls {
        bottom: 15px;
        right: 15px;
        flex-direction: column;
        gap: 8px;
    }

    .music-button,
    .fullscreen-button {
        padding: 10px 16px;
        font-size: 12px;
    }
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="hero">
    <h1>nikasex</h1>
</div>

<div class="feed">
    <img src="IMG_0146.jpeg" alt="Изображение 1">
    <img src="IMG_0148.jpeg" alt="Изображение 2">
    <img src="IMG_0149.jpeg" alt="Изображение 3">
    <img src="IMG_0150.jpeg" alt="Изображение 4">
    <img src="IMG_0151.jpeg" alt="Изображение 5">
    <img src="IMG_0152.jpeg" alt="Изображение 6">
    <img src="IMG_0153.jpeg" alt="Изображение 7">
    <img src="IMG_0154.jpeg" alt="Изображение 8">
</div>

<div class="fullscreen-container" id="fullscreenContainer">
    <button class="fullscreen-close" id="closeFullscreen">&times;</button>
    <img id="fullscreenImage" src="" alt="">
</div>

<div class="controls">
    <button class="music-button" id="musicBtn">🎵 Включить музыку</button>
    <button class="fullscreen-button" id="fullscreenBtn">⛶ Полный экран</button>
</div>

<audio id="bgMusic" loop>
    <source src="SEMATARY 9 SCARECROWS.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const fullscreenContainer = document.getElementById("fullscreenContainer");
const fullscreenImage = document.getElementById("fullscreenImage");
const closeFullscreenBtn = document.getElementById("closeFullscreen");
const feedImages = document.querySelectorAll(".feed img");

let isPlaying = false;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let stars = [];
let mouseX = 0;
let mouseY = 0;

// Адаптивное количество звёзд
const starCount = window.innerWidth < 768 ? 150 : 300;

for (let i = 0; i < starCount; i++) {
    stars.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        radius: Math.random() * 1.5,
        speed: Math.random() * 0.6,
        alpha: Math.random(),
        twinkleSpeed: Math.random() * 0.02
    });
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    stars.forEach(star => {
        star.alpha += star.twinkleSpeed;
        if (star.alpha > 1 || star.alpha < 0) {
            star.twinkleSpeed *= -1;
        }

        ctx.globalAlpha = star.alpha;
        ctx.beginPath();
        ctx.arc(
            star.x + mouseX * 0.02,
            star.y + mouseY * 0.02,
            star.radius,
            0,
            Math.PI * 2
        );
        ctx.fillStyle = "white";
        ctx.fill();

        star.y += star.speed;

        if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
        }
    });

    ctx.globalAlpha = 1;
    requestAnimationFrame(drawStars);
}

drawStars();

window.addEventListener("mousemove", (e) => {
    mouseX = (e.clientX - window.innerWidth / 2) / 50;
    mouseY = (e.clientY - window.innerHeight / 2) / 50;
});

// Музыка
musicBtn.addEventListener("click", () => {
    if (isPlaying) {
        music.pause();
        isPlaying = false;
        musicBtn.textContent = "🎵 Включить музыку";
        musicBtn.classList.remove("playing");
    } else {
        music.volume = 0.5;
        music.play().then(() => {
            isPlaying = true;
            musicBtn.textContent = "⏸ Остановить музыку";
            musicBtn.classList.add("playing");
        }).catch(err => {
            console.log("Ошибка воспроизведения:", err);
        });
    }
});

// Фуллскрин по клику на заголовок
document.querySelector("h1").addEventListener("click", () => {
    if (document.fullscreenElement) {
        document.exitFullscreen();
    } else {
        document.documentElement.requestFullscreen().catch(err => {
            console.log("Ошибка фуллскрина:", err);
        });
    }
});

// Фуллскрин для галереи
fullscreenBtn.addEventListener("click", () => {
    if (document.fullscreenElement) {
        document.exitFullscreen();
    } else {
        document.documentElement.requestFullscreen().catch(err => {
            console.log("Ошибка фуллскрина:", err);
        });
    }
});

// Открыть изображение в фуллскрин
feedImages.forEach((img, index) => {
    img.addEventListener("click", () => {
        fullscreenImage.src = img.src;
        fullscreenContainer.classList.add("active");
    });
});

// Закрыть фуллскрин изображения
closeFullscreenBtn.addEventListener("click", () => {
    fullscreenContainer.classList.remove("active");
});

fullscreenContainer.addEventListener("click", (e) => {
    if (e.target === fullscreenContainer) {
        fullscreenContainer.classList.remove("active");
    }
});

// Закрыть по ESC
document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        fullscreenContainer.classList.remove("active");
    }
});
</script>

</body>
</html>
