<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Ника ✨</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    background: #000;
    min-height: 100dvh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    overflow-x: hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.hero {
    position: relative;
    z-index: 2;
    height: 60dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow: hidden;
}

h1 {
    font-size: clamp(70px, 18vw, 200px);
    font-weight: 700;
    opacity: 0;
    transform: scale(0.8);
    text-align: center;
    word-break: break-word;
    max-width: 100%;
    letter-spacing: -2px;

    background: linear-gradient(
        45deg,
        #ff00cc,
        #3333ff,
        #00ffff,
        #ffcc00,
        #ff0066
    );
    background-size: 400% 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;

    animation:
        gradientMove 6s ease infinite,
        fadeInText 3s ease forwards;

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    text-shadow: 
        0 0 30px rgba(255, 0, 204, 0.5),
        0 0 60px rgba(51, 51, 255, 0.3),
        0 0 90px rgba(0, 255, 255, 0.2);
    filter: drop-shadow(0 8px 32px rgba(0, 0, 0, 0.3));
}

h1:hover {
    transform: scale(1.05);
    text-shadow: 
        0 0 40px rgba(255, 0, 204, 0.7),
        0 0 80px rgba(51, 51, 255, 0.5),
        0 0 120px rgba(0, 255, 255, 0.3);
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes fadeInText {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

.feed {
    position: relative;
    z-index: 2;
    background: transparent;
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 20px;
}

.feed img {
    width: 100%;
    display: block;
    border-radius: 10px;
    object-fit: cover;
    transition: all 0.3s ease;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.feed img:hover {
    transform: scale(1.02);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
}

.controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
}

.music-button {
    background: rgba(0, 0, 0, 0.3);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 14px 22px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 1px rgba(255, 255, 255, 0.2);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
}

.music-button:hover {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.5);
    transform: translateY(-2px);
    box-shadow: 
        0 12px 40px rgba(0, 0, 0, 0.4),
        inset 0 1px 1px rgba(255, 255, 255, 0.3);
}

.music-button.playing {
    background: rgba(100, 200, 255, 0.25);
    border: 1px solid rgba(100, 200, 255, 0.5);
    box-shadow: 
        0 8px 32px rgba(100, 200, 255, 0.2),
        inset 0 1px 1px rgba(255, 255, 255, 0.2);
}

.music-button.playing:hover {
    background: rgba(100, 200, 255, 0.35);
    border: 1px solid rgba(100, 200, 255, 0.6);
    box-shadow: 
        0 12px 40px rgba(100, 200, 255, 0.3),
        inset 0 1px 1px rgba(255, 255, 255, 0.3);
}

@media (max-width: 768px) {
    h1 {
        font-size: clamp(56px, 16vw, 120px);
    }
    
    .hero {
        height: 50dvh;
        padding: 10px;
    }

    .music-button {
        padding: 12px 18px;
        font-size: 12px;
    }
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="hero">
    <h1>nikasex</h1>
</div>

<div class="feed">
    <img src="IMG_0146.jpeg">
    <img src="IMG_0148.jpeg">
    <img src="IMG_0149.jpeg">
    <img src="IMG_0150.jpeg">
    <img src="IMG_0151.jpeg">
    <img src="IMG_0152.jpeg">
    <img src="IMG_0153.jpeg">
    <img src="IMG_0154.jpeg">
</div>

<div class="controls">
    <button class="music-button" id="musicBtn">🎵 Включить музыку</button>
</div>

<audio id="bgMusic" loop>
    <source src="SEMATARY 9 SCARECROWS.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");

let isPlaying = false;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let stars = [];
let mouseX = 0;
let mouseY = 0;

const starCount = window.innerWidth < 768 ? 150 : 300;

for (let i = 0; i < starCount; i++) {
    stars.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        radius: Math.random() * 1.5,
        speed: Math.random() * 0.6,
        alpha: Math.random(),
        twinkleSpeed: Math.random() * 0.02
    });
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    stars.forEach(star => {
        star.alpha += star.twinkleSpeed;
        if (star.alpha > 1 || star.alpha < 0) {
            star.twinkleSpeed *= -1;
        }

        ctx.globalAlpha = star.alpha;
        ctx.beginPath();
        ctx.arc(
            star.x + mouseX * 0.02,
            star.y + mouseY * 0.02,
            star.radius,
            0,
            Math.PI * 2
        );
        ctx.fillStyle = "white";
        ctx.fill();

        star.y += star.speed;

        if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
        }
    });

    ctx.globalAlpha = 1;
    requestAnimationFrame(drawStars);
}

drawStars();

window.addEventListener("mousemove", (e) => {
    mouseX = (e.clientX - window.innerWidth / 2) / 50;
    mouseY = (e.clientY - window.innerHeight / 2) / 50;
});

musicBtn.addEventListener("click", () => {
    if (isPlaying) {
        music.pause();
        isPlaying = false;
        musicBtn.textContent = "🎵 Включить музыку";
        musicBtn.classList.remove("playing");
    } else {
        music.volume = 0.5;
        music.play().then(() => {
            isPlaying = true;
            musicBtn.textContent = "⏸ Остановить музыку";
            musicBtn.classList.add("playing");
        }).catch(err => {
            console.log("Ошибка воспроизведения:", err);
        });
    }
});
</script>

</body>
</html>
